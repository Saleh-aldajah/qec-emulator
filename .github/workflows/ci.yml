name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff (permissive)
        run: ruff check qec_emulator/ --select F --ignore F401,F403,F405,F811,F821,F841

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install numpy pytest
          pip install "fastapi>=0.110" "uvicorn>=0.27" "typer>=0.12" "rich>=13"
          pip install pyyaml httpx networkx matplotlib stim
          pip install -e . --no-deps

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            -k "not bposd and not mwpm and not BPOSD and not MWPM and not run_bposd"

  validate-citation:
    name: Validate CITATION.cff
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - run: pip install cffconvert
      - run: cffconvert --validate -i CITATION.cff
